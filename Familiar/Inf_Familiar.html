    <script>
      function formatDate(date) {
    const d = new Date(date);
    const year = d.getFullYear();
    const month = ("0" + (d.getMonth() + 1)).slice(-2);  // Mes con dos dígitos
    const day = ("0" + d.getDate()).slice(-2);  // Día con dos dígitos
    return `${year}-${month}-${day}`;  // Formato 'YYYY-MM-DD'
}
 // Obtener los datos del usuario desde localStorage
 const user = JSON.parse(localStorage.getItem('user'));
 if (!user || user.role !== 'Relative') {
        alert('Acceso no autorizado.');
        window.location.href = '/login.html'; // o donde tengas tu login
    }
// Comprobar si los datos existen
if (user) {
    // Asignamos los valores a los campos de entrada (input) para el usuario
    document.getElementById('name').value = user.name;
    document.getElementById('id_patient').value = user.additional_info.id_patient;
    document.getElementById('relative_id').value = user.additional_info.id_patient;
    document.getElementById('name1').textContent = user.name;
    document.getElementById('email').value = user.email;
    document.getElementById('user').value = user.role;
    document.getElementById('ID').value = user.id_card;
    document.getElementById('address').value = user.address;
    document.getElementById('phone').value = user.phone;
    document.getElementById('occupation').value = user.additional_info.occupation;
    document.getElementById('marital_status').value = user.additional_info.marital_status;
    document.getElementById('address1').value = user.additional_info.address;
    document.getElementById('direccionFamiliar').value = user.additional_info.address;
    document.getElementById('phone1').value = user.additional_info.phone;
    document.getElementById('TelefonoFamiliar').value = user.additional_info.phone;
    document.getElementById('blood_type').value = user.additional_info.blood_type;
    document.getElementById('ID_P').value = user.id_patient;
    const birthDate = formatDate(user.additional_info.birth_date);
        document.getElementById('birth').value = birthDate;  // Asignamos la fecha en formato 'YYYY-MM-DD'
        document.getElementById('user1').textContent = user.role;

    // Mostrar campos específicos dependiendo del rol
    if (user.role === 'Patient') {
        document.getElementById('patientFields').style.display = 'block';
        document.getElementById('blood_type').value = user.additional_info.blood_type;
        document.getElementById('birth_date').value = user.additional_info.birth_date;
    } else if (user.role === 'Doctor') {
        document.getElementById('doctorFields').style.display = 'block';
        document.getElementById('specialization').value = user.additional_info.specialization;
    }
} else {
    // Si no hay datos de usuario en localStorage, redirigir al login
    window.location.href = 'login.html';
} 
  </script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const formRelative = document.getElementById("formActualizarFamiliar");

  formRelative.addEventListener("submit", function (e) {
    e.preventDefault();

    const id = document.getElementById("relative_id").value.trim();
    const telefono = document.getElementById("telefonoRelative").value.trim();
    const direccion = document.getElementById("direccionRelative").value.trim();

    if (!id || !telefono || !direccion) {
      alert("Por favor complete todos los campos.");
      return;
    }

    fetch("http://localhost:7000/api/relative/update", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        id_relative: id,
        phone: telefono,
        address: direccion,
      }),
    })
      .then((res) => res.json())
      .then((data) => {
        if (data.success) {
          alert("Información actualizada correctamente");

          // ✅ Solo aquí actualizamos el localStorage
          const user = JSON.parse(localStorage.getItem("user"));
          if (user && user.role === "Relative") {
            user.phone = telefono;
            user.address = direccion;
            localStorage.setItem("user", JSON.stringify(user));
          }

          const modal = bootstrap.Modal.getInstance(document.getElementById("modalActualizarFamiliar"));
          if (modal) modal.hide();

          location.reload();
        } else {
          alert("Error al actualizar: " + (data.message || "intente más tarde"));
        }
      })
      .catch((err) => {
        console.error("Error:", err);
        alert("Error de conexión con el servidor.");
      });
  });
});

</script>

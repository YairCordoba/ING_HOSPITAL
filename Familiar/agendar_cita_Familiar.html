    <script>
      const user = JSON.parse(localStorage.getItem('user'));
    
      // Verificar si el usuario es válido y paciente
      if (!user || user.role !== 'Relative') {
        alert('Acceso no autorizado.');
        window.location.href = '/login.html';
        
      } else {
        // Mostrar información del usuario en el DOM
        document.getElementById('user-name').textContent = user.name;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-role').textContent = user.role;
      }
    
    </script>
<script>
  // Evita que el usuario vuelva con el botón de atrás
  window.history.pushState(null, null, window.location.href);
  window.onpopstate = function () {
    window.history.pushState(null, null, window.location.href);
  };
</script>
<script>
  const idPatient = user.additional_info.id_patient;
  document.getElementById('id_patient').value = idPatient;

  // Establecer fecha mínima (hoy)
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('appointment_date').setAttribute('min', hoy);

  // Cargar doctores
  fetch('http://localhost:7000/doctors')
    .then(res => res.json())
    .then(doctores => {
      const select = document.getElementById('id_doctor');
      doctores.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id_doctor;
        opt.textContent = `${d.name} - ${d.specialization}`;
        select.appendChild(opt);
      });
    });

  // Cargar horarios
  document.getElementById('appointment_date').addEventListener('change', () => {
    const idDoctor = document.getElementById('id_doctor').value;
    const fecha = document.getElementById('appointment_date').value;

    if (!idDoctor || !fecha) return;

    fetch(`http://localhost:7000/available-times/${idDoctor}/${fecha}`)
      .then(res => res.json())
      .then(horarios => {
        const select = document.getElementById('appointment_time');
        select.innerHTML = '';

        const hoy = new Date();
        const fechaSeleccionada = new Date(fecha + 'T00:00:00');
        const esHoy = hoy.toDateString() === fechaSeleccionada.toDateString();
        const ahoraEnMin = hoy.getHours() * 60 + hoy.getMinutes();

        const filtrados = horarios.filter(hora => {
          if (!esHoy) return true;
          const [h, m] = hora.split(':');
          return parseInt(h) * 60 + parseInt(m) > ahoraEnMin;
        });

        if (!filtrados.length) {
          select.innerHTML = '<option>No hay horarios disponibles</option>';
        } else {
          filtrados.forEach(hora => {
            const opt = document.createElement('option');
            opt.value = hora;
            opt.textContent = hora;
            select.appendChild(opt);
          });
        }
      });
  });

  // Enviar formulario
  document.getElementById('formCita').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fecha = document.getElementById('appointment_date').value;
    const hoy = new Date().toISOString().split('T')[0];
    if (fecha < hoy) {
      alert('No puedes agendar una cita en una fecha pasada.');
      return;
    }

    const data = {
      id_patient: idPatient,
      id_doctor: document.getElementById('id_doctor').value,
      appointment_date: fecha,
      appointment_time: document.getElementById('appointment_time').value
    };

    const res = await fetch('http://localhost:7000/appointments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    if (res.ok) {
      alert(result.message);
      location.reload();
    } else {
      alert(result.message);
    }
  });
</script>

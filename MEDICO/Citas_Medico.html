    <script>
      function formatDate(date) {
    const d = new Date(date);
    const year = d.getFullYear();
    const month = ("0" + (d.getMonth() + 1)).slice(-2);  // Mes con dos dígitos
    const day = ("0" + d.getDate()).slice(-2);  // Día con dos dígitos
    return `${year}-${month}-${day}`;  // Formato 'YYYY-MM-DD'
      }
      const user = JSON.parse(localStorage.getItem('user'));
    
      if (!user || user.role !== 'Doctor') {
          alert('Acceso no autorizado.');
          window.location.href = '../login.html';
      }
    
      document.addEventListener('DOMContentLoaded', async () => {
          // Mostrar datos del usuario en la interfaz
          document.getElementById('user-name').textContent = user.name;
          document.getElementById('user-email').textContent = user.email;
          document.getElementById('user-role').textContent = user.role;
          document.getElementById('user-card').textContent = user.id_card;
          document.getElementById('idMedico').textContent = user.additional_info.id_doctor;

      });
    </script> 
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const cedula = document.getElementById('user-card')?.textContent.trim();
      const container = document.getElementById('citasContainer');
      
      fetch(`http://localhost:7000/api/citas?cedula=${cedula}`)
        .then(res => res.json())
        .then(data => {
          if (!data.success || data.citas.length === 0) {
            container.innerHTML = `
              <div class="alert alert-warning">No hay citas asignadas actualmente.</div>
            `;
            return;
          }
    
          data.citas.forEach(cita => {
            const card = document.createElement('div');
            card.className = 'col';
    
            card.innerHTML = `
              <div class="card border-info h-100">
                <div class="card-header text-info">
                  Cita para: ${cita.patient_name}
                </div>
                <div class="card-body">
                  <h5 class="card-title text-info">Fecha: ${cita.appointment_date}</h5>
                  <p class="card-text fs-sm text-info">Hora: ${cita.appointment_time}<br>
                    Documento del paciente: ${cita.patient_id_card}<br>
                    Estado: ${cita.status === 0 ? 'Pendiente' : 'Confirmada'}
                  </p>
                  ${cita.status === 0 ? `
                    <button class="btn btn-sm btn-success confirmar-btn" data-id="${cita.id_appointment}">
                      Confirmar cita
                    </button>` : ''}
                </div>
              </div>
            `;
    
            container.appendChild(card);
          });
    
          document.querySelectorAll('.confirmar-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = btn.getAttribute('data-id');
    
              fetch('http://localhost:7000/api/confirmar-cita', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_appointment: id })
              })
              .then(res => res.json())
              .then(response => {
                if (response.success) {
                  alert('Cita confirmada');
                  location.reload(); // Refresca para actualizar el estado
                } else {
                  alert('Error al confirmar cita');
                }
              })
              .catch(() => alert('Error al conectar con el servidor'));
            });
          });
        })});
    </script>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes del Paciente</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Contenedor principal -->
<div class="container mt-5">
  <h2>Ver Reportes del Paciente</h2>
  <div class="mb-3">
    <label for="patient_id" class="form-label">ID del Paciente:</label>
    <p><strong>ID Paciente:</strong> <span id="idPaciente">Cargando...</span></p>
    <input type="number" class="form-control" id="patient_id" placeholder="ID del paciente">
    <button class="btn btn-primary mt-3" onclick="loadReports()">Ver Reportes</button>
  </div>

  <!-- Acordeón de reportes -->
  <div class="accordion" id="accordionAlt">
    <!-- Reportes cargados dinámicamente aquí -->
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Obtener parámetros de la URL
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  // Cargar reportes por ID
  async function loadReports() {
    const patientId = document.getElementById("patient_id").value;

    if (!patientId) {
      alert("Por favor, ingrese un ID de paciente.");
      return;
    }

    try {
      const response = await fetch(`http://localhost:7000/api/reports?patient_id=${patientId}`);

      if (!response.ok) {
        const data = await response.json();
        alert(data.error || data.message || "Hubo un error en la solicitud.");
        return;
      }

      const reports = await response.json();

      if (reports.length === 0) {
        alert("No se encontraron reportes para este paciente.");
        return;
      }

      const accordion = document.getElementById('accordionAlt');
      accordion.innerHTML = '';

      reports.forEach((report, index) => {
        const accordionItem = `
          <div class="accordion-item border-0 rounded-3 shadow-sm mb-3">
            <h3 class="accordion-header" id="heading${index}">
              <button class="accordion-button shadow-none rounded-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" aria-expanded="true" aria-controls="collapse${index}">
                Reporte #${report.report_id} - Fecha: ${report.report_date}
              </button>
            </h3>
            <div class="accordion-collapse collapse" id="collapse${index}" aria-labelledby="heading${index}" data-bs-parent="#accordionAlt">
              <div class="accordion-body pt-0">
                <strong>Sugerencias de cuidado:</strong> ${report.care_suggestions} <br>
                <strong>Razón de seguimiento:</strong> ${report.follow_up_reason}
              </div>
            </div>
          </div>
        `;
        accordion.innerHTML += accordionItem;
      });

    } catch (error) {
      console.error("Hubo un error al obtener los reportes:", error);
      alert("Hubo un error al obtener los reportes.");
    }
  }

  // Cargar reportes automáticamente si viene en la URL
  document.addEventListener("DOMContentLoaded", () => {
    const patientIdFromUrl = getQueryParam("patient_id");
    if (patientIdFromUrl) {
      document.getElementById("patient_id").value = patientIdFromUrl;
      loadReports();
    }
  });
</script>

</body>
</html>

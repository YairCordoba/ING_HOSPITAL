  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'Patient') {
      alert('Acceso no autorizado.');
      window.location.href = '../login.html';
    }
  
    const id_patient = user?.additional_info?.id_patient;
    document.getElementById('idPaciente').textContent = id_patient;
  
    let registros = [];
  
    function formatTime(t) {
      return t?.slice(0, 5) || '';
    }
  
    async function cargarSignosVitales(id) {
      try {
        const res = await fetch(`http://localhost:7000/vital-signs/patient/${id}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        registros = await res.json();
        mostrarRegistros(registros);
      } catch (err) {
        console.error('Error al cargar signos:', err);
        alert('Error al obtener los registros.');
      }
    }
  
    function mostrarRegistros(data) {
      const tbody = document.querySelector('#tablaSignos tbody');
      tbody.innerHTML = '';
  
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">No hay registros</td></tr>';
        return;
      }
  
      data.forEach(reg => {
        const row = `
          <tr>
            <td>${reg.measurement_date}</td>
            <td>${formatTime(reg.measurement_time)}</td>
            <td>${reg.heart_rate ?? '-'}</td>
            <td>${reg.temperature ?? '-'}</td>
            <td>${reg.blood_pressure ?? '-'}</td>
            <td>${reg.respiratory_rate ?? '-'}</td>
            <td>${reg.weight ?? '-'}</td>
            <td>${reg.observations ?? '-'}</td>
          </tr>`;
        tbody.innerHTML += row;
      });
    }
  
    function aplicarFiltros() {
      const desde = document.getElementById('filtroDesde').value;
      const hasta = document.getElementById('filtroHasta').value;
      const buscar = document.getElementById('buscar').value.toLowerCase();
  
      let filtrados = registros;
  
      if (desde) {
        filtrados = filtrados.filter(r => r.measurement_date >= desde);
      }
      if (hasta) {
        filtrados = filtrados.filter(r => r.measurement_date <= hasta);
      }
  
      if (buscar) {
        filtrados = filtrados.filter(r =>
          Object.values(r).some(val =>
            (val + '').toLowerCase().includes(buscar)
          )
        );
      }
  
      mostrarRegistros(filtrados);
    }
    cargarSignosVitales(id_patient);
  </script>
